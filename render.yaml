services:
  - type: web
    name: borsapy-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --workers 2 --threads 4 --timeout 120
    envVars:
      - key: API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: borsapy-cache
          property: connectionString
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: GZIP_MINIMUM_SIZE
        value: "1024"
      - key: CORS_ALLOW_ORIGINS
        value: "*"

  - type: redis
    name: borsapy-cache
    ipAllowList: []
    plan: starter
